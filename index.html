<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Znajdź Impostora</title>
<style>
body {
  font-family: Arial;
  background: #0b1c2c;
  color: white;
  text-align: center;
}
.card {
  background: #132f4c;
  border-radius: 15px;
  padding: 15px;
  margin: 10px auto;
  max-width: 420px;
}
input, select {
  padding: 5px;
  margin: 5px;
  border-radius: 8px;
  border: none;
}
button {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: none;
  background: #4cafef;
  color: white;
  cursor: pointer;
}
.hidden {
  display: none;
}
</style>
</head>
<body>

<h1>🎮 Znajdź Impostora</h1>

<div class="card">
  <h3>Tryb gry</h3>
  <select id="mode" onchange="toggleProMode()">
    <option value="normal">Normalny</option>
    <option value="pro">Pro (własne hasło)</option>
  </select>

  <div id="proInputs" class="hidden">
    <input id="customWord" placeholder="Twoje hasło">
    <input id="customHint" placeholder="Twój hint">
  </div>
</div>

<div class="card">
  <h3>Nicki graczy</h3>
  <div id="playersInputs"></div>
  <button onclick="addPlayer()">➕ Dodaj gracza</button>
</div>

<button onclick="startGame()">🚀 Start</button>

<div id="game" class="hidden">
  <div class="card">
    <h2 id="playerTurn"></h2>
    <button onclick="showRole()">👁️ Pokaż rolę</button>
    <button onclick="hideRole()">🙈 Ukryj rolę</button>
    <p id="role"></p>
    <button onclick="nextPlayer()">➡️ Dalej</button>
  </div>
</div>

<script>

// ===== SŁOWA =====
const wordsData = [
{word:"Krzesło",hint:"cztery nogi"},
{word:"Telefon",hint:"ciągłe sprawdzanie"},
{word:"Samochód",hint:"cztery koła"},
{word:"Kot",hint:"własne zasady"},
{word:"Pies",hint:"wierny cień"},
{word:"Szkoła",hint:"długi obowiązek"},
{word:"Dom",hint:"bezpieczne miejsce"},
{word:"Miłość",hint:"ślepy wybór"},
{word:"Czas",hint:"ciągła ucieczka"},
{word:"Film",hint:"fałszywa historia"},
{word:"Piłka",hint:"okrągły cel"},
{word:"Deszcz",hint:"mokry problem"},
{word:"Las",hint:"zielony chaos"}
];

// ===== LOGIKA =====

let players = [];
let roles = [];
let currentPlayer = 0;

function toggleProMode() {
  const mode = document.getElementById("mode").value;
  document.getElementById("proInputs").classList.toggle("hidden", mode !== "pro");
}

function addPlayer() {
  let div = document.createElement("div");
  div.innerHTML = `<input placeholder="Nick gracza">`;
  document.getElementById("playersInputs").appendChild(div);
}

addPlayer(); addPlayer(); addPlayer();

function startGame() {
  players = [];

  document.querySelectorAll("#playersInputs input").forEach(input => {
    if (input.value.trim()) players.push(input.value.trim());
  });

  if (players.length < 3) {
    alert("Minimum 3 graczy!");
    return;
  }

  let mode = document.getElementById("mode").value;
  let entry;

  if (mode === "pro") {
    let word = document.getElementById("customWord").value.trim();
    let hint = document.getElementById("customHint").value.trim();

    if (!word || !hint) {
      alert("Podaj hasło i hint!");
      return;
    }

    entry = {word, hint};

  } else {
    entry = wordsData[Math.floor(Math.random()*wordsData.length)];
  }

  roles = players.map(() => entry.word);

  let impostorIndex = Math.floor(Math.random()*players.length);
  roles[impostorIndex] = "IMPOSTOR 🕵️\nPodpowiedź: " + entry.hint;

  currentPlayer = 0;
  document.getElementById("game").classList.remove("hidden");
  updatePlayer();
}

function updatePlayer() {
  document.getElementById("playerTurn").innerText = players[currentPlayer];
  document.getElementById("role").innerText = "";
}

function showRole() {
  document.getElementById("role").innerText = roles[currentPlayer];
}

function hideRole() {
  document.getElementById("role").innerText = "❓";
}

function nextPlayer() {
  currentPlayer++;
  if (currentPlayer >= players.length) {
    alert("Wszyscy zobaczyli role! Teraz gra 😈");
    location.reload();
  } else {
    updatePlayer();
  }
}

</script>

</body>
</html>
