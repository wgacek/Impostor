<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Znajdź Impostora</title>
<style>
body {
  font-family: Arial;
  background: #0b1c2c;
  color: white;
  text-align: center;
}
.card {
  background: #132f4c;
  border-radius: 15px;
  padding: 15px;
  margin: 10px auto;
  max-width: 420px;
}
input {
  padding: 5px;
  margin: 5px;
  border-radius: 8px;
  border: none;
}
button {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: none;
  background: #4cafef;
  color: white;
  cursor: pointer;
}
button:hover {
  background: #3a9edc;
}
.hidden {
  display: none;
}
</style>
</head>
<body>

<h1>🎮 Znajdź Impostora</h1>

<div class="card">
  <h3>Nicki graczy</h3>
  <div id="playersInputs"></div>
  <button onclick="addPlayer()">➕ Dodaj gracza</button>
</div>

<button onclick="startGame()">🚀 Start</button>

<div id="game" class="hidden">
  <div class="card">
    <h2 id="playerTurn"></h2>
    <button onclick="showRole()">👁️ Pokaż rolę</button>
    <button onclick="hideRole()">🙈 Ukryj rolę</button>
    <p id="role"></p>
    <button onclick="nextPlayer()">➡️ Dalej</button>
  </div>
</div>

<script>

const wordsData = [

{word:"Krzesło",hint:"cztery nogi"},
{word:"Stół",hint:"środek spotkań"},
{word:"Okno",hint:"świat zewnętrzny"},
{word:"Drzwi",hint:"zmiana miejsca"},
{word:"Lampa",hint:"nocne światło"},
{word:"Łóżko",hint:"utrata czasu"},
{word:"Szafa",hint:"ukryte rzeczy"},
{word:"Pilot",hint:"zdalna władza"},
{word:"Telefon",hint:"ciągłe sprawdzanie"},
{word:"Ładowarka",hint:"ostatnia nadzieja"},

{word:"Samochód",hint:"cztery koła"},
{word:"Rower",hint:"siła nóg"},
{word:"Pociąg",hint:"stalowa droga"},
{word:"Samolot",hint:"wysoka podróż"},
{word:"Statek",hint:"woda długa"},
{word:"Droga",hint:"kierunek ruchu"},

{word:"Chleb",hint:"codzienny wybór"},
{word:"Masło",hint:"gładka warstwa"},
{word:"Ser",hint:"ciągnąca masa"},
{word:"Jajko",hint:"krucha forma"},
{word:"Makaron",hint:"splątana forma"},
{word:"Ryż",hint:"małe ziarna"},

{word:"Jabłko",hint:"zakazany owoc"},
{word:"Banan",hint:"śliska skórka"},
{word:"Cytryna",hint:"kwaśna mina"},
{word:"Winogrono",hint:"małe kule"},
{word:"Truskawka",hint:"czerwone lato"},

{word:"Kot",hint:"własne zasady"},
{word:"Pies",hint:"wierny cień"},
{word:"Koń",hint:"szybki ciężar"},
{word:"Krowa",hint:"biały napój"},
{word:"Wilk",hint:"nocne wycie"},
{word:"Lis",hint:"cicha sztuczka"},

{word:"Szkoła",hint:"długi obowiązek"},
{word:"Zeszyt",hint:"puste kartki"},
{word:"Długopis",hint:"nie zawsze działa"},
{word:"Nauczyciel",hint:"trudne pytania"},
{word:"Lekcja",hint:"wolny czas"},

{word:"Dom",hint:"bezpieczne miejsce"},
{word:"Sklep",hint:"więcej rzeczy"},
{word:"Szpital",hint:"niechciane miejsce"},
{word:"Bank",hint:"cyfry rosną"},
{word:"Apteka",hint:"gorzkie rozwiązania"},

{word:"Miłość",hint:"ślepy wybór"},
{word:"Strach",hint:"zimne ręce"},
{word:"Złość",hint:"nagły ogień"},
{word:"Smutek",hint:"ciężka cisza"},
{word:"Radość",hint:"krótki moment"},

{word:"Czas",hint:"ciągła ucieczka"},
{word:"Noc",hint:"ciemna pora"},
{word:"Rano",hint:"trudny start"},
{word:"Wieczór",hint:"spokojny koniec"},
{word:"Weekend",hint:"za krótki"},

{word:"Film",hint:"fałszywa historia"},
{word:"Muzyka",hint:"zmiana nastroju"},
{word:"Gra",hint:"udana rywalizacja"},
{word:"Kino",hint:"ciemna sala"},
{word:"Koncert",hint:"żywy dźwięk"},

{word:"Książka",hint:"cichy świat"},
{word:"Autor",hint:"twórca historii"},
{word:"Strona",hint:"kolejny etap"},
{word:"Gazeta",hint:"stare newsy"},

{word:"Piłka",hint:"okrągły cel"},
{word:"Mecz",hint:"walka punktów"},
{word:"Drużyna",hint:"wspólny wynik"},
{word:"Sędzia",hint:"ostatnie słowo"},

{word:"Deszcz",hint:"mokry problem"},
{word:"Śnieg",hint:"biała cisza"},
{word:"Wiatr",hint:"niewidzialna siła"},
{word:"Burza",hint:"głośne niebo"},
{word:"Mgła",hint:"brak widoku"},

{word:"Las",hint:"zielony chaos"},
{word:"Rzeka",hint:"ciągły ruch"},
{word:"Morze",hint:"bez końca"},
{word:"Pustynia",hint:"sucha pustka"},
{word:"Góra",hint:"wysoki trud"}

];

// ===== LOGIKA =====

let players = [];
let roles = [];
let currentPlayer = 0;

function addPlayer() {
  let div = document.createElement("div");
  div.innerHTML = `<input placeholder="Nick gracza">`;
  document.getElementById("playersInputs").appendChild(div);
}

addPlayer(); addPlayer(); addPlayer();

function startGame() {
  players = [];

  document.querySelectorAll("#playersInputs input").forEach(input => {
    if (input.value.trim()) players.push(input.value.trim());
  });

  if (players.length < 3) {
    alert("Minimum 3 graczy!");
    return;
  }

  let entry = wordsData[Math.floor(Math.random()*wordsData.length)];

  roles = players.map(() => entry.word);

  let impostorIndex = Math.floor(Math.random()*players.length);
  roles[impostorIndex] = "IMPOSTOR 🕵️\nPodpowiedź: " + entry.hint;

  currentPlayer = 0;
  document.getElementById("game").classList.remove("hidden");
  updatePlayer();
}

function updatePlayer() {
  document.getElementById("playerTurn").innerText = players[currentPlayer];
  document.getElementById("role").innerText = "";
}

function showRole() {
  document.getElementById("role").innerText = roles[currentPlayer];
}

function hideRole() {
  document.getElementById("role").innerText = "❓";
}

function nextPlayer() {
  currentPlayer++;
  if (currentPlayer >= players.length) {
    alert("Wszyscy zobaczyli role! Teraz gra 😈");
    location.reload();
  } else {
    updatePlayer();
  }
}

</script>

</body>
</html>
